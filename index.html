<!DOCTYPE html>
<html lang="en">
<head>
  <title>Senda Voucher System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --primary: #3B82F6;
      --secondary: #22C55E;
      --accent: #EF4444;
      --bg: #f0f9ff;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      text-align: center;
      background: linear-gradient(180deg, #dbeafe, #f0f9ff, #ffffff);
      color: #1e293b;
      min-height: 100vh;
      padding-bottom: 50px;
    }

    /* HEADER & LOGO */
    .header {
      background: var(--primary);
      color: white;
      padding: 40px 20px;
      border-bottom-left-radius: 40px;
      border-bottom-right-radius: 40px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .logo-box {
      width: 70px;
      height: 70px;
      background: white;
      border-radius: 20px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 35px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .logo-text {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
      margin: 0;
    }

    .tagline {
      font-size: 14px;
      opacity: 0.9;
      font-weight: 300;
    }

    /* CARDS */
    .card {
      background: white;
      margin: 20px auto;
      padding: 25px;
      border-radius: 24px;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: left;
      border: 1px solid rgba(255,255,255,0.3);
    }

    h3 { 
      margin-top: 0; 
      color: #1e40af; 
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      margin-left: 2px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin: 6px 0 16px 0;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      box-sizing: border-box;
      font-size: 16px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus { border-color: var(--primary); }

    button {
      background: var(--secondary);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 14px;
      width: 100%;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:active { transform: scale(0.97); }

    /* VOUCHER DISPLAY */
    .voucher-box {
      background: #f8fafc;
      margin-top: 20px;
      padding: 20px;
      border-radius: 18px;
      border: 2px dashed var(--primary);
      text-align: center;
    }

    .voucher-code {
      font-size: 26px;
      font-weight: 800;
      color: var(--accent);
      background: #fee2e2;
      padding: 8px 20px;
      border-radius: 10px;
      display: inline-block;
      margin: 10px 0;
      letter-spacing: 1px;
    }

    .status-msg {
      padding: 12px;
      border-radius: 12px;
      margin-top: 10px;
      font-size: 14px;
      font-weight: 500;
    }

    .history-list {
      font-size: 13px;
      padding-left: 20px;
      color: #475569;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-box">💸</div>
  <h1 class="logo-text">SENDA</h1>
  <div class="tagline">Send help instantly</div>
</div>

<div class="card">
  <h3>Create Voucher</h3>
  
  <label>Recipient Cell Number</label>
  <input id="cell" type="tel" placeholder="e.g. 0812345678">

  <label>Shop Code / Name</label>
  <input id="shop" placeholder="Where can they spend this?">

  <label>Voucher Amount</label>
  <select id="amount">
    <option value="50">R50</option>
    <option value="100">R100</option>
    <option value="150">R150</option>
    <option value="200">R200</option>
  </select>

  <label>Set 4-Digit PIN</label>
  <input id="pin" type="password" maxlength="4" placeholder="****">

  <button onclick="createVoucher()">Send Voucher</button>
  <div id="output"></div>
</div>

<div class="card">
  <h3>Shop Verification</h3>
  
  <label>Your Shop Code</label>
  <input id="verifyShop" placeholder="Enter Shop Code">
  
  <label>Customer Voucher Code</label>
  <input id="verifyCode" placeholder="SV-XXXXXX">
  
  <label>Customer PIN</label>
  <input id="verifyPin" type="password" maxlength="4" placeholder="****">
  
  <label>Amount Spent Today</label>
  <input id="spendAmount" type="number" placeholder="0.00">

  <button style="background: var(--primary);" onclick="verifyVoucher()">Verify & Deduct</button>
  <div id="verifyOutput"></div>
</div>

<div class="card">
  <h3>Check Balance</h3>
  <label>Voucher Code</label>
  <input id="checkCode" placeholder="SV-XXXXXX">
  <label>PIN</label>
  <input id="checkPin" type="password" placeholder="****">
  <button style="background: #64748b;" onclick="checkVoucher()">View History</button>
  <div id="checkOutput"></div>
</div>

<script>
// --- CORE LOGIC ---

// Simulated SMS function - In production, connect this to an API
function sendSendaSMS(number, message) {
  console.log(`%c SMS SENT TO ${number}: ${message}`, "background: #222; color: #bada55; padding: 5px;");
  // alert("SMS Sent to " + number + "\n\n" + message); // Optional: uncomment to see alert
}

function createVoucher() {
  const cell = document.getElementById("cell").value;
  const shop = document.getElementById("shop").value.trim();
  const amount = document.getElementById("amount").value;
  const pin = document.getElementById("pin").value;

  if (!shop || !pin || !cell) {
    alert("Please complete all fields.");
    return;
  }

  const code = "SV" + Math.floor(100000 + Math.random() * 900000);
  
  const voucher = {
    code, pin, cell,
    originalAmount: parseInt(amount),
    balance: parseInt(amount),
    shop: shop,
    status: "ACTIVE",
    history: []
  };

  let vouchers = JSON.parse(localStorage.getItem("senda_vouchers")) || [];
  vouchers.push(voucher);
  localStorage.setItem("senda_vouchers", JSON.stringify(vouchers));

  // Initial SMS
  sendSendaSMS(cell, `SENDA: You have a new R${amount} voucher for ${shop}. Code: ${code}. PIN: ${pin}.`);

  const whatsappMsg = `💸 *SENDA VOUCHER*%0A%0AShop: ${shop}%0AAmount: R${amount}%0ACode: *${code}*%0APIN: ${pin}%0A%0A_Keep this code safe to redeem at the shop._`;
  const whatsappLink = "https://wa.me/" + cell + "?text=" + whatsappMsg;

  document.getElementById("output").innerHTML = `
    <div class="voucher-box">
      <p>Voucher Created!</p>
      <div class="voucher-code">${code}</div>
      <a href="${whatsappLink}" target="_blank">
        <button style="background:#25D366; margin-top:10px;">Share to WhatsApp</button>
      </a>
    </div>
  `;
}

function verifyVoucher() {
  const shop = document.getElementById("verifyShop").value.trim();
  const code = document.getElementById("verifyCode").value.trim().toUpperCase();
  const pin = document.getElementById("verifyPin").value.trim();
  const spend = parseInt(document.getElementById("spendAmount").value);

  if (!spend || spend <= 0) { alert("Enter a valid spend amount"); return; }

  let vouchers = JSON.parse(localStorage.getItem("senda_vouchers")) || [];
  let index = vouchers.findIndex(v => v.code === code && v.pin === pin && v.shop === shop);

  if (index === -1) {
    document.getElementById("verifyOutput").innerHTML = `<div class="status-msg" style="background:#fee2e2; color:#b91c1c;">❌ Invalid Credentials or Shop Code</div>`;
    return;
  }

  let v = vouchers[index];

  if (v.status === "USED") {
    document.getElementById("verifyOutput").innerHTML = `<div class="status-msg" style="background:#ffedd5; color:#9a3412;">⚠️ This voucher is already finished.</div>`;
    return;
  }

  if (spend > v.balance) {
    document.getElementById("verifyOutput").innerHTML = `<div class="status-msg" style="background:#fee2e2; color:#b91c1c;">❌ Balance too low: R${v.balance}</div>`;
    return;
  }

  // --- 80% RULE LOGIC ---
  let totalSpentAfterThis = (v.originalAmount - v.balance) + spend;
  let minSpendRequired = v.originalAmount * 0.8;
  let potentialRemaining = v.balance - spend;

  // If customer tries to empty the voucher but hasn't reached 80% total goods spend
  if (potentialRemaining === 0 && totalSpentAfterThis < minSpendRequired) {
    document.getElementById("verifyOutput").innerHTML = `
      <div class="status-msg" style="background:#fee2e2; color:#b91c1c;">
        ❌ 80% Rule: Customer must buy at least R${minSpendRequired} in total goods before clearing the voucher.
      </div>`;
    return;
  }

  // Success - Update Voucher
  v.balance -= spend;
  v.history.push({ 
    amount: spend, 
    date: new Date().toLocaleString(),
    remaining: v.balance 
  });

  if (v.balance === 0) v.status = "USED";

  vouchers[index] = v;
  localStorage.setItem("senda_vouchers", JSON.stringify(vouchers));

  // SMS Balance Notification
  sendSendaSMS(v.cell, `SENDA: R${spend} spent at ${shop}. Your new voucher balance is R${v.balance}.`);

  document.getElementById("verifyOutput").innerHTML = `
    <div class="status-msg" style="background:#dcfce7; color:#166534;">
      ✅ Approved! <br> Remaining Balance: <b>R${v.balance}</b>
    </div>
  `;
}

function checkVoucher() {
  const code = document.getElementById("checkCode").value.trim().toUpperCase();
  const pin = document.getElementById("checkPin").value.trim();

  let vouchers = JSON.parse(localStorage.getItem("senda_vouchers")) || [];
  let v = vouchers.find(v => v.code === code && v.pin === pin);

  if (!v) {
    document.getElementById("checkOutput").innerHTML = "<p style='color:red;'>Not found.</p>";
    return;
  }

  let historyHTML = v.history.map(h => `<li>Spent R${h.amount} on ${h.date} (Left: R${h.remaining})</li>`).join("");

  document.getElementById("checkOutput").innerHTML = `
    <div class="voucher-box" style="text-align:left;">
      <p><b>Balance: R${v.balance}</b></p>
      <p><b>Status:</b> ${v.status}</p>
      <hr>
      <p><b>History:</b></p>
      <ul class="history-list">${historyHTML || "No transactions yet."}</ul>
    </div>
  `;
}
</script>

</body>
</html>
