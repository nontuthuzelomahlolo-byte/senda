<!DOCTYPE html>
<html>
<head>
  <title>Senda Voucher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e7eb; /* grey background */
    }

    /* MAIN WRAPPER (THIS IS THE FIX) */
    .app {
      max-width: 420px;
      margin: 30px auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    /* HEADER INSIDE BOX */
    .header {
      background: #3B82F6;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .header h2 {
      margin: 0;
    }

    .header p {
      margin: 5px 0 0;
      font-size: 13px;
      opacity: 0.9;
    }

    /* CONTENT AREA */
    .content {
      padding: 20px;
    }

    /* CARDS */
    .card {
      margin-bottom: 20px;
    }

    h3 {
      text-align: center;
      margin-top: 0;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      background: #22C55E;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .terms {
      font-size: 12px;
      margin-top: 10px;
      color: #444;
    }

    .terms ul {
      padding-left: 18px;
    }

    .terms label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    .voucher {
      background: #E0F2FE;
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      border: 2px dashed #3B82F6;
      text-align: center;
    }

    .code {
      font-size: 22px;
      font-weight: bold;
      color: #EF4444;
    }

  </style>
</head>

<body>

<div class="app">

  <div class="header">
    <h2>💸 SENDA</h2>
    <p>Send help instantly</p>
  </div>

  <div class="content">

    <!-- CREATE -->
    <div class="card">
      <h3>Create Voucher</h3>

      <input id="name" placeholder="Your Name">
      <input id="phone" placeholder="Phone Number">
      <input id="shop" placeholder="Enter Shop Code">

      <select id="amount">
        <option value="50">R50</option>
        <option value="100">R100</option>
        <option value="150">R150</option>
        <option value="200">R200</option>
      </select>

      <input id="pin" placeholder="Create 4-digit PIN">

      <div class="terms">
        <b>📜 Terms & Conditions</b>
        <ul>
          <li>Minimum 80% must be spent</li>
          <li>Balance can be given as change</li>
          <li>Valid only at selected shop</li>
          <li>One-time use only</li>
        </ul>

        <label>
          <input type="checkbox" id="agreeTerms">
          I agree to Terms & Conditions
        </label>
      </div>

      <button onclick="createVoucher()">Send Voucher</button>

      <div id="output"></div>
    </div>

    <!-- VERIFY -->
    <div class="card">
      <h3>Shop Verification</h3>

      <input id="verifyShop" placeholder="Shop Code">
      <input id="verifyCode" placeholder="Voucher Code">
      <input id="verifyPin" placeholder="PIN">

      <button onclick="verifyVoucher()">Verify Voucher</button>

      <div id="verifyOutput"></div>
    </div>

  </div>

</div>

<script>
function createVoucher() {

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let shop = document.getElementById("shop").value;
  let amount = document.getElementById("amount").value;
  let pin = document.getElementById("pin").value;
  let agreed = document.getElementById("agreeTerms").checked;

  if (!name || !phone || !shop || !pin) {
    alert("Fill all fields");
    return;
  }

  if (!agreed) {
    alert("Agree to Terms");
    return;
  }

  let code = "SV" + Math.floor(100000 + Math.random() * 900000);

  let voucher = { code, pin, amount, shop, status: "ACTIVE" };

  let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];
  vouchers.push(voucher);
  localStorage.setItem("vouchers", JSON.stringify(vouchers));

  let link = "https://wa.me/?text=" + encodeURIComponent(
`SENDA VOUCHER
Shop: ${shop}
Amount: R${amount}
Code: ${code}
PIN: ${pin}`
  );

  document.getElementById("output").innerHTML = `
    <div class="voucher">
      <p><b>${shop}</b></p>
      <p>R${amount}</p>
      <p class="code">${code}</p>
      <p>PIN: ${pin}</p>
      <a href="${link}" target="_blank">
        <button style="background:#25D366;">Send via WhatsApp</button>
      </a>
    </div>
  `;
}

function verifyVoucher() {

  let shop = document.getElementById("verifyShop").value.trim();
  let code = document.getElementById("verifyCode").value.trim();
  let pin = document.getElementById("verifyPin").value.trim();

  let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];

  let index = vouchers.findIndex(v =>
    v.code === code && v.pin === pin && v.shop === shop
  );

  if (index === -1) {
    document.getElementById("verifyOutput").innerHTML =
      "<p style='color:red;'>Invalid voucher</p>";
    return;
  }

  if (vouchers[index].status === "USED") {
    document.getElementById("verifyOutput").innerHTML =
      "<p style='color:orange;'>Already used</p>";
    return;
  }

  vouchers[index].status = "USED";
  localStorage.setItem("vouchers", JSON.stringify(vouchers));

  document.getElementById("verifyOutput").innerHTML =
    "<p style='color:green;'>✅ Approved</p>";
}
</script>

</body>
</html>
