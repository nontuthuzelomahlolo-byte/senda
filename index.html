<!DOCTYPE html>
<html>
<head>
  <title>Senda Voucher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;

      background: linear-gradient(
        180deg,
        #dbeafe 0%,
        #f0f9ff 50%,
        #ffffff 100%
      );
    }

    .bg-shape {
      position: fixed;
      border-radius: 50%;
      opacity: 0.2;
      z-index: 0;
    }

    .shape1 {
      width: 200px;
      height: 200px;
      background: #3B82F6;
      top: -50px;
      left: -50px;
    }

    .shape2 {
      width: 250px;
      height: 250px;
      background: #22C55E;
      bottom: -80px;
      right: -80px;
    }

    .header {
      background: #3B82F6;
      color: white;
      padding: 20px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
    }

    .tagline {
      font-size: 14px;
      opacity: 0.9;
    }

    .card {
      background: rgba(255,255,255,0.95);
      margin: 20px auto;
      padding: 20px;
      border-radius: 16px;
      max-width: 400px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      position: relative;
      z-index: 1;
      backdrop-filter: blur(10px);
    }

    input, select {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: #22C55E;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      width: 95%;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .voucher {
      background: #E0F2FE;
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      border: 2px dashed #3B82F6;
    }

    .code {
      font-size: 22px;
      font-weight: bold;
      color: #EF4444;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>

  <!-- Background -->
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <!-- Header -->
  <div class="header">
    <div class="logo">💸 SENDA</div>
    <div class="tagline">Send help instantly</div>
  </div>

  <!-- CREATE VOUCHER -->
  <div class="card">
    <h3>Create Voucher</h3>

    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Phone Number">
    <input id="shop" placeholder="Enter Shop Code">

    <select id="amount">
      <option value="50">R50</option>
      <option value="100">R100</option>
      <option value="150">R150</option>
      <option value="200">R200</option>
    </select>

    <input id="pin" placeholder="Create 4-digit PIN">

    <button onclick="createVoucher()">Send Voucher</button>

    <div id="output"></div>
  </div>

  <!-- SHOP VERIFICATION -->
  <div class="card">
    <h3>Shop Verification</h3>

    <input id="verifyShop" placeholder="Shop Code">
    <input id="verifyCode" placeholder="Voucher Code">
    <input id="verifyPin" placeholder="PIN">

    <button onclick="verifyVoucher()">Verify Voucher</button>

    <div id="verifyOutput"></div>
  </div>

  <script>
    function createVoucher() {

      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      let shop = document.getElementById("shop").value;
      let amount = document.getElementById("amount").value;
      let pin = document.getElementById("pin").value;

      if (!name || !phone || !shop || !pin) {
        alert("Please fill all fields");
        return;
      }

      let code = "SV" + Math.floor(100000 + Math.random() * 900000);

      let voucher = {
        code: code,
        pin: pin,
        amount: amount,
        shop: shop,
        status: "ACTIVE"
      };

      let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];
      vouchers.push(voucher);
      localStorage.setItem("vouchers", JSON.stringify(vouchers));

      let message = `
💸 SENDA VOUCHER

Shop: ${shop}
Amount: R${amount}

Code: ${code}
PIN: ${pin}

📄 View SPECIALS: specials.pdf
`;

      let whatsappLink = "https://wa.me/?text=" + encodeURIComponent(message);

      let voucherHTML = `
        <div class="voucher">
          <h3>Voucher Ready ✅</h3>
          <p><b>Shop:</b> ${shop}</p>
          <p><b>Amount:</b> R${amount}</p>
          <p class="code">${code}</p>
          <p><b>PIN:</b> ${pin}</p>

          <a href="${whatsappLink}" target="_blank">
            <button style="margin-top:15px;background:#25D366;">
              📲 Send via WhatsApp
            </button>
          </a>
        </div>
      `;

      document.getElementById("output").innerHTML = voucherHTML;
    }

    function verifyVoucher() {

      let shopInput = document.getElementById("verifyShop").value.trim();
      let code = document.getElementById("verifyCode").value.trim();
      let pin = document.getElementById("verifyPin").value.trim();

      if (!shopInput || !code || !pin) {
        document.getElementById("verifyOutput").innerHTML =
          "<p style='color:red;font-weight:bold;'>❌ Enter Shop Code, Voucher Code and PIN</p>";
        return;
      }

      let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];

      let index = vouchers.findIndex(v =>
        v.code === code &&
        v.pin === pin &&
        v.shop === shopInput
      );

      if (index === -1) {
        document.getElementById("verifyOutput").innerHTML =
          "<p style='color:red;font-weight:bold;'>❌ Invalid details or wrong shop</p>";
        return;
      }

      let voucher = vouchers[index];

      if (voucher.status === "USED") {
        document.getElementById("verifyOutput").innerHTML =
          "<p style='color:orange;font-weight:bold;'>⚠️ Voucher Already Used</p>";
        return;
      }

      // ✅ mark used
      voucher.status = "USED";
      vouchers[index] = voucher;
      localStorage.setItem("vouchers", JSON.stringify(vouchers));

      document.getElementById("verifyOutput").innerHTML = `
        <div style="
          background:#dcfce7;
          padding:15px;
          border-radius:10px;
          margin-top:10px;
          border:2px solid #22c55e;
        ">
          <h3 style="color:#16a34a;">✅ APPROVED</h3>
          <p><b>Shop:</b> ${voucher.shop}</p>
          <p><b>Amount:</b> R${voucher.amount}</p>
          <p style="color:#555;">Voucher marked as USED</p>
        </div>
      `;
    }
  </script>

</body>
</html>
