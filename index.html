<!DOCTYPE html>
<html>
<head>
  <title>Senda Voucher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;

      /* 🌤️ Soft gradient background */
      background: linear-gradient(
        180deg,
        #dbeafe 0%,
        #f0f9ff 50%,
        #ffffff 100%
      );
    }

    /* 🌈 Floating shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      opacity: 0.2;
      z-index: 0;
    }

    .shape1 {
      width: 200px;
      height: 200px;
      background: #3B82F6;
      top: -50px;
      left: -50px;
    }

    .shape2 {
      width: 250px;
      height: 250px;
      background: #22C55E;
      bottom: -80px;
      right: -80px;
    }

    /* 🟦 Header */
    .header {
      background: #3B82F6;
      color: white;
      padding: 20px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
    }

    .tagline {
      font-size: 14px;
      opacity: 0.9;
    }

    /* 📦 Main card */
    .card {
      background: rgba(255,255,255,0.95);
      margin: 20px auto;
      padding: 20px;
      border-radius: 16px;
      max-width: 400px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      position: relative;
      z-index: 1;

      /* 💎 Glass effect */
      backdrop-filter: blur(10px);
    }

    input, select {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    /* 🟢 Button */
    button {
      background: #22C55E;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      width: 95%;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
      transform: scale(1.02);
    }

    /* 🎟️ Voucher output */
    .voucher {
      background: #E0F2FE;
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      border: 2px dashed #3B82F6;
      animation: fadeIn 0.5s ease;
    }

    .voucher h3 {
      margin-top: 0;
    }

    .code {
      font-size: 22px;
      font-weight: bold;
      color: #EF4444;
      letter-spacing: 2px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

  </style>
</head>

<body>

  <!-- 🌈 Background shapes -->
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>

  <!-- 🟦 Header -->
  <div class="header">
    <div class="logo">💸 SENDA</div>
    <div class="tagline">Send help instantly</div>
  </div>

  <!-- 📦 Card -->
  <div class="card">
    <h3>Create Voucher</h3>

    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Phone Number">
    <input id="shop" placeholder="Enter Shop Code">

    <select id="amount">
      <option value="50">R50</option>
      <option value="100">R100</option>
      <option value="150">R150</option>
      <option value="200">R200</option>
    </select>

    <input id="pin" placeholder="Create 4-digit PIN">

    <button onclick="createVoucher()">Send Voucher</button>

    <div id="output"></div>
  </div>

  <script>
    function createVoucher() {

      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      let shop = document.getElementById("shop").value;
      let amount = document.getElementById("amount").value;
      let pin = document.getElementById("pin").value;

      if (!name || !phone || !shop || !pin) {
        alert("Please fill all fields");
        return;
      }

      let code = "SV" + Math.floor(100000 + Math.random() * 900000);

      let voucherHTML = `
        <div class="voucher">
          <h3>Voucher Ready ✅</h3>
          <p><b>Shop:</b> ${shop}</p>
          <p><b>Amount:</b> R${amount}</p>
          <p class="code">${code}</p>
          <p><b>PIN:</b> ${pin}</p>
        </div>
      `;

      document.getElementById("output").innerHTML = voucherHTML;
    }
  </script>

</body>
</html>
