<!DOCTYPE html>
<html>
<head>
  <title>Senda Voucher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      text-align: center;
      background: linear-gradient(180deg,#dbeafe,#f0f9ff,#ffffff);
      color: #333;
    }

    .header {
      background: #3B82F6;
      color: white;
      padding: 30px 20px;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* Placeholder for your actual logo image */
    .logo-img {
      width: 60px;
      height: 60px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 5px;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .tagline {
      font-size: 14px;
      opacity: 0.9;
      margin-top: 5px;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 25px;
      border-radius: 20px;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: left;
    }

    h3 { margin-top: 0; color: #1e40af; border-left: 4px solid #3B82F6; padding-left: 10px; }

    label { font-size: 12px; font-weight: bold; color: #666; margin-left: 5px; }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0 18px 0;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      background: #22C55E;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 12px;
      width: 100%;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:active { transform: scale(0.98); }

    .voucher-display {
      background: #f8fafc;
      margin-top: 20px;
      padding: 20px;
      border-radius: 15px;
      border: 2px dashed #3B82F6;
      text-align: center;
    }

    .code-highlight {
      font-size: 24px;
      font-weight: 800;
      color: #ef4444;
      background: #fee2e2;
      padding: 5px 15px;
      border-radius: 8px;
      display: inline-block;
      margin: 10px 0;
    }

    .sms-notice {
      font-size: 11px;
      color: #64748b;
      margin-top: 10px;
      font-style: italic;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo-container">
    <div class="logo-img">💸</div>
    <div class="logo-text">SENDA</div>
  </div>
  <div class="tagline">Send help instantly</div>
</div>

<div class="card">
  <h3>Create Voucher</h3>
  
  <label>RECIPIENT CELL NUMBER</label>
  <input id="cell" type="tel" placeholder="e.g. 0812345678">

  <label>SHOP CODE</label>
  <input id="shop" placeholder="Enter Shop Name or ID">

  <label>AMOUNT</label>
  <select id="amount">
    <option value="50">R50</option>
    <option value="100">R100</option>
    <option value="150">R150</option>
    <option value="200">R200</option>
  </select>

  <label>SECRET 4-DIGIT PIN</label>
  <input id="pin" type="password" maxlength="4" placeholder="****">

  <button onclick="createVoucher()">Send & Generate Voucher</button>
  <div id="output"></div>
</div>

<div class="card">
  <h3>Shop Verification</h3>
  
  <label>SHOP CODE</label>
  <input id="verifyShop" placeholder="Enter Shop Code">
  
  <label>VOUCHER CODE</label>
  <input id="verifyCode" placeholder="SV-XXXXXX">
  
  <label>CUSTOMER PIN</label>
  <input id="verifyPin" type="password" placeholder="****">
  
  <label>AMOUNT TO REDEEM</label>
  <input id="spendAmount" type="number" placeholder="Enter amount spent">

  <button style="background: #3B82F6;" onclick="verifyVoucher()">Verify & Process</button>
  <div id="verifyOutput"></div>
</div>

<script>
// Mock SMS Function
function sendMockSMS(number, message) {
  console.log(`To: ${number} | SMS Content: ${message}`);
  // In a real app, you would fetch() a Twilio or BulkSMS endpoint here
}

function createVoucher() {
  const cell = document.getElementById("cell").value;
  const shop = document.getElementById("shop").value;
  const amount = document.getElementById("amount").value;
  const pin = document.getElementById("pin").value;

  if (!shop || !pin || !cell) {
    alert("Please fill in all details including Cell Number");
    return;
  }

  const code = "SV" + Math.floor(100000 + Math.random() * 900000);
  
  const voucher = {
    code, pin, cell,
    amount: parseInt(amount),
    balance: parseInt(amount),
    shop: shop,
    status: "ACTIVE",
    history: []
  };

  let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];
  vouchers.push(voucher);
  localStorage.setItem("vouchers", JSON.stringify(vouchers));

  // Send "Initial" SMS Simulation
  sendMockSMS(cell, `SENDA: You received a R${amount} voucher for ${shop}. Code: ${code}. Keep your PIN safe!`);

  const whatsappMsg = `💸 *SENDA VOUCHER*%0A%0AShop: ${shop}%0AAmount: R${amount}%0ACode: *${code}*%0APIN: ${pin}%0A%0A_Keep this code safe to redeem at the shop._`;
  const whatsappLink = "https://wa.me/" + cell + "?text=" + whatsappMsg;

  document.getElementById("output").innerHTML = `
    <div class="voucher-display">
      <p>Voucher Created for <b>${shop}</b></p>
      <div class="code-highlight">${code}</div>
      <p class="sms-notice">SMS Notification Sent to ${cell}</p>
      <a href="${whatsappLink}" target="_blank">
        <button style="background:#25D366; margin-top:10px;">Send via WhatsApp</button>
      </a>
    </div>
  `;
}

function verifyVoucher() {
  const shop = document.getElementById("verifyShop").value.trim();
  const code = document.getElementById("verifyCode").value.trim();
  const pin = document.getElementById("verifyPin").value.trim();
  const spend = parseInt(document.getElementById("spendAmount").value);

  let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];
  let index = vouchers.findIndex(v => v.code === code && v.pin === pin && v.shop === shop);

  if (index === -1) {
    document.getElementById("verifyOutput").innerHTML = "<p style='color:red; font-weight:bold;'>❌ Access Denied: Invalid Shop, Code, or PIN</p>";
    return;
  }

  let v = vouchers[index];

  if (spend > v.balance) {
    document.getElementById("verifyOutput").innerHTML = `<p style='color:red;'>❌ Insufficient Funds. Balance: R${v.balance}</p>`;
    return;
  }

  // Update Balance
  v.balance -= spend;
  v.history.push({ spent: spend, time: new Date().toLocaleString() });

  if (v.balance === 0) v.status = "USED";

  vouchers[index] = v;
  localStorage.setItem("vouchers", JSON.stringify(vouchers));

  // SEND BALANCE SMS
  const smsMessage = `SENDA: R${spend} spent at ${shop}. Your new voucher balance is R${v.balance}.`;
  sendMockSMS(v.cell, smsMessage);

  document.getElementById("verifyOutput").innerHTML = `
    <div style="background:#dcfce7; padding:15px; border-radius:10px; margin-top:10px;">
      <p style="color:#166534; font-weight:bold; margin:0;">✅ Approved</p>
      <p style="margin:5px 0;">New Balance: <b>R${v.balance}</b></p>
      <small>SMS Balance alert sent to customer.</small>
    </div>
  `;
}
</script>

</body>
</html>
