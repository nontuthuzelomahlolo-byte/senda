<!DOCTYPE html>
<html>
<head>
  <title>Senda Voucher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #F4F8FF;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .header {
      background: #3B82F6;
      color: white;
      padding: 20px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .tagline {
      font-size: 14px;
      opacity: 0.9;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 20px;
      border-radius: 16px;
      max-width: 400px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
    }

    input, select {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      background: #22C55E;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      width: 95%;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .voucher {
      background: #E0F2FE;
      margin-top: 20px;
      padding: 20px;
      border-radius: 12px;
      border: 2px dashed #3B82F6;
    }

    .voucher h3 {
      margin-top: 0;
    }

    .code {
      font-size: 20px;
      font-weight: bold;
      color: #EF4444;
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="logo">💸 SENDA</div>
    <div class="tagline">Send help instantly</div>
  </div>

  <div class="card">
    <h3>Create Voucher</h3>

    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Phone Number">
    <input id="shop" placeholder="Enter Shop Code">

    <select id="amount">
      <option value="50">R50</option>
      <option value="100">R100</option>
      <option value="150">R150</option>
      <option value="200">R200</option>
    </select>

    <input id="pin" placeholder="Create 4-digit PIN">

    <button onclick="createVoucher()">Send Voucher</button>

    <div id="output"></div>
  </div>

  <script>
    function createVoucher() {

      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      let shop = document.getElementById("shop").value;
      let amount = document.getElementById("amount").value;
      let pin = document.getElementById("pin").value;

      if (!name || !phone || !shop || !pin) {
        alert("Fill all fields");
        return;
      }

      let code = "SV" + Math.floor(100000 + Math.random() * 900000);

      let voucherHTML = `
        <div class="voucher">
          <h3>Voucher Ready ✅</h3>
          <p><b>Shop:</b> ${shop}</p>
          <p><b>Amount:</b> R${amount}</p>
          <p class="code">${code}</p>
          <p><b>PIN:</b> ${pin}</p>
        </div>
      `;

      document.getElementById("output").innerHTML = voucherHTML;
    }
  </script>

</body>
</html>
