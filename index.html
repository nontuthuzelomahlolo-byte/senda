<!DOCTYPE html>
<html>
<head>
  <title>Senda Voucher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      text-align: center;
      background: linear-gradient(180deg,#dbeafe,#f0f9ff,#ffffff);
    }

    .header {
      background: #3B82F6;
      color: white;
      padding: 20px;
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }

    .card {
      background: white;
      margin: 20px auto;
      padding: 20px;
      border-radius: 16px;
      max-width: 400px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      text-align: left;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #22C55E;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
    }

    .voucher {
      background: #E0F2FE;
      margin-top: 15px;
      padding: 15px;
      border-radius: 12px;
      border: 2px dashed #3B82F6;
      text-align: center;
    }

    .code {
      font-size: 22px;
      font-weight: bold;
      color: #EF4444;
    }

    .terms {
      font-size: 12px;
    }

    .terms ul {
      padding-left: 18px;
    }

    .terms label {
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>💸 SENDA</h2>
  <p>Send help instantly</p>
</div>

<!-- CREATE -->
<div class="card">
  <h3>Create Voucher</h3>

  <input id="name" placeholder="Your Name">
  <input id="phone" placeholder="Phone Number">
  <input id="shop" placeholder="Enter Shop Code">

  <select id="amount">
    <option value="50">R50</option>
    <option value="100">R100</option>
    <option value="150">R150</option>
    <option value="200">R200</option>
  </select>

  <input id="pin" placeholder="Create 4-digit PIN">

  <div class="terms">
    <b>📜 Terms & Conditions</b>
    <ul>
      <li>Minimum 80% must be spent</li>
      <li>Remaining can be given as change</li>
      <li>Valid only at selected shop</li>
      <li>One-time use (after full spend)</li>
    </ul>

    <label>
      <input type="checkbox" id="agreeTerms">
      I agree to Terms & Conditions
    </label>
  </div>

  <button onclick="createVoucher()">Send Voucher</button>

  <div id="output"></div>
</div>

<!-- VERIFY -->
<div class="card">
  <h3>Shop Verification</h3>

  <input id="verifyShop" placeholder="Shop Code">
  <input id="verifyCode" placeholder="Voucher Code">
  <input id="verifyPin" placeholder="PIN">
  <input id="spendAmount" placeholder="Amount Spent">

  <button onclick="verifyVoucher()">Verify Voucher</button>

  <div id="verifyOutput"></div>
</div>

<script>

function createVoucher() {

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let shop = document.getElementById("shop").value;
  let amount = document.getElementById("amount").value;
  let pin = document.getElementById("pin").value;
  let agreed = document.getElementById("agreeTerms").checked;

  if (!name || !phone || !shop || !pin) {
    alert("Fill all fields");
    return;
  }

  if (!agreed) {
    alert("Agree to Terms");
    return;
  }

  let code = "SV" + Math.floor(100000 + Math.random() * 900000);

  let voucher = {
    code: code,
    pin: pin,
    amount: parseInt(amount),
    balance: parseInt(amount),
    shop: shop,
    status: "ACTIVE"
  };

  let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];
  vouchers.push(voucher);
  localStorage.setItem("vouchers", JSON.stringify(vouchers));

  let link = "https://wa.me/?text=" + encodeURIComponent(
`💸 SENDA VOUCHER

Shop: ${shop}
Amount: R${amount}

Code: ${code}
PIN: ${pin}`
  );

  document.getElementById("output").innerHTML = `
    <div class="voucher">
      <p><b>${shop}</b></p>
      <p>R${amount}</p>
      <p class="code">${code}</p>
      <p>PIN: ${pin}</p>

      <a href="${link}" target="_blank">
        <button style="background:#25D366;">Send via WhatsApp</button>
      </a>
    </div>
  `;
}

function verifyVoucher() {

  let shop = document.getElementById("verifyShop").value.trim();
  let code = document.getElementById("verifyCode").value.trim();
  let pin = document.getElementById("verifyPin").value.trim();
  let spend = parseInt(document.getElementById("spendAmount").value);

  if (!shop || !code || !pin || !spend) {
    document.getElementById("verifyOutput").innerHTML =
      "<p style='color:red;'>Fill all fields</p>";
    return;
  }

  let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];

  let index = vouchers.findIndex(v =>
    v.code === code && v.pin === pin && v.shop === shop
  );

  if (index === -1) {
    document.getElementById("verifyOutput").innerHTML =
      "<p style='color:red;'>Invalid voucher</p>";
    return;
  }

  let voucher = vouchers[index];

  if (voucher.status === "USED") {
    document.getElementById("verifyOutput").innerHTML =
      "<p style='color:orange;'>Already used</p>";
    return;
  }

  if (spend > voucher.balance) {
    document.getElementById("verifyOutput").innerHTML =
      "<p style='color:red;'>Exceeds balance</p>";
    return;
  }

  voucher.balance -= spend;

  let spentTotal = voucher.amount - voucher.balance;
  let minSpend = voucher.amount * 0.8;

  let message = "";

  if (spentTotal < minSpend && voucher.balance === 0) {
    message = "❌ Must reach 80% before finishing";
    voucher.balance += spend;
  } else {

    if (spentTotal >= minSpend && voucher.balance === 0) {
      voucher.status = "USED";
      message = "✅ Completed. Give change if needed";
    } else {
      message = "✅ Partial spend approved";
    }

    vouchers[index] = voucher;
    localStorage.setItem("vouchers", JSON.stringify(vouchers));
  }

  document.getElementById("verifyOutput").innerHTML = `
    <div style="background:#dcfce7;padding:10px;border-radius:10px;">
      <p>${message}</p>
      <p><b>Remaining:</b> R${voucher.balance}</p>
    </div>
  `;
}

</script>

</body>
</html>
