<!DOCTYPE html>
<html>
<head>
  <title>Senda Voucher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f0f9ff;
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 30px auto;
      border-radius: 15px;
      max-width: 400px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #22c55e;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 10px;
      width: 95%;
      font-weight: bold;
      cursor: pointer;
    }

    .voucher {
      background: #e0f2fe;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
      border: 2px dashed #3b82f6;
    }

    .code {
      font-size: 22px;
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Create Voucher</h2>

  <input id="shop" placeholder="Shop Code">
  
  <select id="amount">
    <option value="50">R50</option>
    <option value="100">R100</option>
    <option value="150">R150</option>
  </select>

  <input id="pin" placeholder="4-digit PIN">

  <button onclick="createVoucher()">Send Voucher</button>

  <div id="output"></div>
</div>

<div class="card">
  <h2>Shop Verification</h2>

  <input id="verifyCode" placeholder="Voucher Code">
  <input id="verifyPin" placeholder="PIN">
  <input id="spend" placeholder="Amount to spend">

  <button onclick="verifyVoucher()">Verify</button>

  <div id="verifyOutput"></div>
</div>

<script>

function createVoucher() {

  let shop = document.getElementById("shop").value;
  let amount = document.getElementById("amount").value;
  let pin = document.getElementById("pin").value;

  if (!shop || !pin) {
    alert("Fill all fields");
    return;
  }

  let code = "SV" + Math.floor(100000 + Math.random() * 900000);

  let voucher = {
    code: code,
    pin: pin,
    amount: parseInt(amount),
    remaining: parseInt(amount),
    shop: shop,
    status: "ACTIVE",
    lastUsed: null,
    history: []
  };

  let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];
  vouchers.push(voucher);
  localStorage.setItem("vouchers", JSON.stringify(vouchers));

  let message = `
SENDA VOUCHER

Shop: ${shop}
Amount: R${amount}

Code: ${code}
PIN: ${pin}
`;

  let whatsappLink = "https://wa.me/?text=" + encodeURIComponent(message);

  document.getElementById("output").innerHTML = `
    <div class="voucher">
      <p><b>Shop:</b> ${shop}</p>
      <p><b>Amount:</b> R${amount}</p>
      <p class="code">${code}</p>
      <p>PIN: ${pin}</p>

      <a href="${whatsappLink}" target="_blank">
        <button style="background:#25D366;">Send via WhatsApp</button>
      </a>
    </div>
  `;
}

function verifyVoucher() {

  let code = document.getElementById("verifyCode").value.trim();
  let pin = document.getElementById("verifyPin").value.trim();
  let spend = parseInt(document.getElementById("spend").value);

  let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];

  let index = vouchers.findIndex(v =>
    v.code === code && v.pin === pin
  );

  if (index === -1) {
    document.getElementById("verifyOutput").innerHTML =
      "<p style='color:red;'>❌ Invalid voucher</p>";
    return;
  }

  let v = vouchers[index];

  if (v.status === "USED") {
    document.getElementById("verifyOutput").innerHTML =
      "<p style='color:orange;'>⚠️ Already used</p>";
    return;
  }

  if (v.remaining < spend) {
    document.getElementById("verifyOutput").innerHTML =
      "<p style='color:red;'>❌ Not enough balance</p>";
    return;
  }

  // update balance
  v.remaining -= spend;

  // update last used
  v.lastUsed = new Date().toLocaleString();

  // add history
  v.history.push({
    spent: spend,
    remaining: v.remaining,
    time: v.lastUsed
  });

  if (v.remaining === 0) {
    v.status = "USED";
  }

  vouchers[index] = v;
  localStorage.setItem("vouchers", JSON.stringify(vouchers));

  let historyHTML = v.history.map(h =>
    `<li>R${h.spent} | Left: R${h.remaining} | ${h.time}</li>`
  ).join("");

  document.getElementById("verifyOutput").innerHTML = `
    <div style="background:#dcfce7;padding:15px;border-radius:10px;">
      <h3>✅ Approved</h3>
      <p>Remaining: R${v.remaining}</p>
      <p>Last Used: ${v.lastUsed}</p>
      <ul style="text-align:left;">${historyHTML}</ul>
    </div>
  `;
}

</script>

</body>
</html>
