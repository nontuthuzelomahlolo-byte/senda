<script>
  function createVoucher() {

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let shop = document.getElementById("shop").value;
    let amount = document.getElementById("amount").value;
    let pin = document.getElementById("pin").value;

    if (!name || !phone || !shop || !pin) {
      alert("Please fill all fields");
      return;
    }

    let code = "SV" + Math.floor(100000 + Math.random() * 900000);

    // 📲 WhatsApp message
    let message = `
💸 SENDA VOUCHER

Shop: ${shop}
Amount: R${amount}

Code: ${code}
PIN: ${pin}

Use this voucher at the shop.
`;

    let encodedMessage = encodeURIComponent(message);

    let whatsappLink = "https://wa.me/?text=" + encodedMessage;

    let voucherHTML = `
      <div class="voucher">
        <h3>Voucher Ready ✅</h3>
        <p><b>Shop:</b> ${shop}</p>
        <p><b>Amount:</b> R${amount}</p>
        <p class="code">${code}</p>
        <p><b>PIN:</b> ${pin}</p>

        <a href="${whatsappLink}" target="_blank">
          <button style="margin-top:15px;background:#25D366;">
            📲 Send via WhatsApp
          </button>
        </a>
      </div>
    `;

    document.getElementById("output").innerHTML = voucherHTML;
  }
</script>
