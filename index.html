<!DOCTYPE html>
<html>
<head>
  <title>Senda Voucher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #1e3a8a;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    input, select {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      width: 95%;
      font-weight: bold;
    }

    .voucher {
      background: #e0f2fe;
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>💸 SENDA VOUCHER</h1>

  <div class="card">

    <h3>Send Help Instantly</h3>

    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Phone Number">

    <input id="shop" placeholder="Enter Shop Code">

    <select id="amount">
      <option value="50">R50</option>
      <option value="100">R100</option>
      <option value="150">R150</option>
      <option value="200">R200</option>
    </select>

    <input id="pin" placeholder="Create 4-digit PIN">

    <button onclick="createVoucher()">Create Voucher</button>

    <div id="output"></div>

  </div>

  <script>
    function createVoucher() {

      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      let shop = document.getElementById("shop").value;
      let amount = document.getElementById("amount").value;
      let pin = document.getElementById("pin").value;

      if (!name || !phone || !shop || !pin) {
        alert("Fill all fields");
        return;
      }

      let code = "SV" + Math.floor(100000 + Math.random() * 900000);

      let voucherHTML = `
        <div class="voucher">
          <h3>Voucher Created ✅</h3>
          <p><b>Shop:</b> ${shop}</p>
          <p><b>Amount:</b> R${amount}</p>
          <p><b>Code:</b> ${code}</p>
          <p><b>PIN:</b> ${pin}</p>
        </div>
      `;

      document.getElementById("output").innerHTML = voucherHTML;
    }
  </script>

</body>
</html>
