<!DOCTYPE html>
<html>
<head>
  <title>Senda Voucher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
    }

    /* HEADER */
    .header {
      background: #3B82F6;
      color: white;
      text-align: center;
      padding: 18px;
      border-radius: 0 0 20px 20px;
    }

    .header h2 {
      margin: 0;
    }

    .header p {
      margin: 4px 0 0;
      font-size: 13px;
      opacity: 0.9;
    }

    /* MAIN CONTAINER */
    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    /* CARDS */
    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      margin-top: 20px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
    }

    h3 {
      margin-top: 0;
      text-align: center;
    }

    /* INPUTS */
    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border-radius: 10px;
      border: none;
      background: #22C55E;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #16a34a;
    }

    /* TERMS */
    .terms {
      font-size: 12px;
      margin-top: 12px;
      color: #444;
    }

    .terms ul {
      padding-left: 18px;
      margin: 8px 0;
    }

    .terms label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    /* VOUCHER DISPLAY */
    .voucher {
      background: #E0F2FE;
      margin-top: 20px;
      padding: 18px;
      border-radius: 12px;
      border: 2px dashed #3B82F6;
      text-align: center;
    }

    .code {
      font-size: 22px;
      font-weight: bold;
      color: #EF4444;
      letter-spacing: 2px;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h2>💸 SENDA</h2>
    <p>Send help instantly</p>
  </div>

  <div class="container">

    <!-- CREATE VOUCHER -->
    <div class="card">
      <h3>Create Voucher</h3>

      <input id="name" placeholder="Your Name">
      <input id="phone" placeholder="Phone Number">
      <input id="shop" placeholder="Enter Shop Code">

      <select id="amount">
        <option value="50">R50</option>
        <option value="100">R100</option>
        <option value="150">R150</option>
        <option value="200">R200</option>
      </select>

      <input id="pin" placeholder="Create 4-digit PIN">

      <!-- TERMS -->
      <div class="terms">
        <b>📜 Terms & Conditions</b>
        <ul>
          <li>Minimum 80% must be spent in-store</li>
          <li>Remaining balance can be given as change</li>
          <li>Valid only at selected shop</li>
          <li>Voucher can only be used once</li>
        </ul>

        <label>
          <input type="checkbox" id="agreeTerms">
          I agree to Terms & Conditions
        </label>
      </div>

      <button onclick="createVoucher()">Send Voucher</button>

      <div id="output"></div>
    </div>

    <!-- SHOP VERIFICATION -->
    <div class="card">
      <h3>Shop Verification</h3>

      <input id="verifyShop" placeholder="Shop Code">
      <input id="verifyCode" placeholder="Voucher Code">
      <input id="verifyPin" placeholder="PIN">

      <button onclick="verifyVoucher()">Verify Voucher</button>

      <div id="verifyOutput"></div>
    </div>

  </div>

  <script>
    function createVoucher() {

      let name = document.getElementById("name").value;
      let phone = document.getElementById("phone").value;
      let shop = document.getElementById("shop").value;
      let amount = document.getElementById("amount").value;
      let pin = document.getElementById("pin").value;
      let agreed = document.getElementById("agreeTerms").checked;

      if (!name || !phone || !shop || !pin) {
        alert("Please fill all fields");
        return;
      }

      if (!agreed) {
        alert("You must agree to Terms & Conditions");
        return;
      }

      let code = "SV" + Math.floor(100000 + Math.random() * 900000);

      let voucher = {
        code: code,
        pin: pin,
        amount: amount,
        shop: shop,
        status: "ACTIVE"
      };

      let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];
      vouchers.push(voucher);
      localStorage.setItem("vouchers", JSON.stringify(vouchers));

      let message = `
💸 SENDA VOUCHER

Shop: ${shop}
Amount: R${amount}

Code: ${code}
PIN: ${pin}
`;

      let whatsappLink = "https://wa.me/?text=" + encodeURIComponent(message);

      document.getElementById("output").innerHTML = `
        <div class="voucher">
          <h3>Voucher Ready ✅</h3>
          <p><b>Shop:</b> ${shop}</p>
          <p><b>Amount:</b> R${amount}</p>
          <p class="code">${code}</p>
          <p><b>PIN:</b> ${pin}</p>

          <a href="${whatsappLink}" target="_blank">
            <button style="margin-top:10px;background:#25D366;">
              📲 Send via WhatsApp
            </button>
          </a>
        </div>
      `;
    }

    function verifyVoucher() {

      let shopInput = document.getElementById("verifyShop").value.trim();
      let code = document.getElementById("verifyCode").value.trim();
      let pin = document.getElementById("verifyPin").value.trim();

      if (!shopInput || !code || !pin) {
        document.getElementById("verifyOutput").innerHTML =
          "<p style='color:red;font-weight:bold;'>❌ Enter Shop Code, Voucher Code and PIN</p>";
        return;
      }

      let vouchers = JSON.parse(localStorage.getItem("vouchers")) || [];

      let index = vouchers.findIndex(v =>
        v.code === code &&
        v.pin === pin &&
        v.shop === shopInput
      );

      if (index === -1) {
        document.getElementById("verifyOutput").innerHTML =
          "<p style='color:red;font-weight:bold;'>❌ Invalid details or wrong shop</p>";
        return;
      }

      let voucher = vouchers[index];

      if (voucher.status === "USED") {
        document.getElementById("verifyOutput").innerHTML =
          "<p style='color:orange;font-weight:bold;'>⚠️ Voucher Already Used</p>";
        return;
      }

      voucher.status = "USED";
      vouchers[index] = voucher;
      localStorage.setItem("vouchers", JSON.stringify(vouchers));

      document.getElementById("verifyOutput").innerHTML = `
        <div style="
          background:#dcfce7;
          padding:15px;
          border-radius:10px;
          margin-top:10px;
          border:2px solid #22c55e;
          text-align:center;
        ">
          <h3 style="color:#16a34a;">✅ APPROVED</h3>
          <p><b>Shop:</b> ${voucher.shop}</p>
          <p><b>Amount:</b> R${voucher.amount}</p>
          <p>Voucher marked as USED</p>
        </div>
      `;
    }
  </script>

</body>
</html>
